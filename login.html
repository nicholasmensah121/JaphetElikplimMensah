<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - GENTLEMEN PARLOR</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="css/notifications.css" />
    <style>
        .login-container {
            min-height: calc(100vh - 200px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, #f5f5f5 0%, #ffffff 100%);
        }

        .login-wrapper {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            max-width: 450px;
            width: 100%;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 10px;
        }

        .login-header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #8B7355;
            box-shadow: 0 0 0 3px rgba(139, 115, 85, 0.1);
        }

        .form-group input::placeholder {
            color: #999;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 13px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .remember-me input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .remember-me label {
            margin: 0;
            cursor: pointer;
            font-weight: 400;
        }

        .forgot-password {
            color: #8B7355;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .forgot-password:hover {
            text-decoration: underline;
        }

        .message {
            padding: 12px 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .message.show {
            display: block;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .message.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .form-actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            text-decoration: none;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-primary {
            background: #8B7355;
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            background: #6d5a45;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(139, 115, 85, 0.3);
        }

        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .loading-spinner {
            display: none;
            width: 16px;
            height: 16px;
            border: 2px solid #fff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .btn:not(:disabled) .loading-spinner {
            display: inline-block;
        }

        .login-footer {
            text-align: center;
            margin-top: 25px;
            padding-top: 25px;
            border-top: 1px solid #ddd;
        }

        .login-footer p {
            color: #666;
            font-size: 14px;
            margin: 0 0 10px 0;
        }

        .login-footer a {
            color: #8B7355;
            text-decoration: none;
            font-weight: 600;
        }

        .login-footer a:hover {
            text-decoration: underline;
        }

        .divider {
            text-align: center;
            margin: 25px 0;
            font-size: 13px;
            color: #999;
            position: relative;
        }

        .divider::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            width: 100%;
            height: 1px;
            background: #ddd;
            z-index: 1;
        }

        .divider span {
            background: white;
            padding: 0 10px;
            position: relative;
            z-index: 2;
        }

        .demo-credentials {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 6px;
            margin-top: 20px;
            font-size: 12px;
            color: #666;
        }

        .demo-credentials strong {
            display: block;
            margin-bottom: 8px;
            color: #333;
        }

        .demo-credentials code {
            background: white;
            padding: 2px 5px;
            border-radius: 3px;
            font-family: monospace;
        }

        .password-toggle {
            position: relative;
        }

        .password-toggle-icon {
            position: absolute;
            right: 15px;
            top: 38px;
            cursor: pointer;
            color: #999;
            transition: all 0.3s ease;
            font-size: 18px;
        }

        .password-toggle-icon:hover {
            color: #333;
        }

        .form-group.password-toggle input {
            padding-right: 40px;
        }

        @media (max-width: 480px) {
            .login-wrapper {
                padding: 30px 20px;
            }

            .login-header h1 {
                font-size: 24px;
            }

            .form-options {
                flex-direction: column;
                gap: 10px;
                align-items: flex-start;
            }
        }

        input:-webkit-autofill,
        input:-webkit-autofill:hover,
        input:-webkit-autofill:focus {
            -webkit-box-shadow: 0 0 0 1000px white inset !important;
            -webkit-text-fill-color: #333 !important;
        }
    </style>
</head>
<body>
    <div id="loadingSpinner" class="loading-overlay hidden">
        <div class="spinner"></div>
    </div>
    <header>
        <div class="container">
            <div class="brand">
                <div class="logo-container">
                    <img src="images/Gentlemen Parlor Logo copy.png" alt="Gentlemen Parlor Logo" />
                </div>
                <h1>GENTLEMEN PARLOR</h1>
            </div>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="contact.html">Contact</a></li>
                    <li><a href="user.html" data-account-link>Account</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="login-container">
        <div class="login-wrapper">
            <div class="login-header">
                <h1>Welcome Back</h1>
                <p>Sign in to your GENTLEMEN PARLOR account</p>
            </div>

            <div id="messageBox" class="message"></div>

            <form id="loginForm">
                <!-- Email -->
                <div class="form-group">
                    <label for="email">Email Address <span class="required-star">*</span></label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="example@email.com" 
                        required 
                        autocomplete="email"
                    />
                </div>

                <!-- Password -->
                <div class="form-group password-toggle">
                    <label for="password">Password <span class="required-star">*</span></label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="Enter your password" 
                        required 
                        autocomplete="current-password"
                    />
                    <span class="password-toggle-icon" id="togglePassword" title="Show/Hide Password">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </span>
                </div>

                <!-- Remember Me & Forgot Password -->
                <div class="form-options">
                    <div class="remember-me">
                        <input type="checkbox" id="rememberMe" name="rememberMe" />
                        <label for="rememberMe">Remember me</label>
                    </div>
                    <a href="forgot-password.html" class="forgot-password">Forgot password?</a>
                </div>

                <!-- Submit Button -->
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary" id="submitBtn">
                        <span class="loading-spinner"></span>
                        Sign In
                    </button>
                </div>
            </form>

            <!-- Demo Credentials (for testing) -->
            <div class="demo-credentials">
                <strong>Demo Account:</strong>
                Email: <code>demo@example.com</code><br>
                Password: <code>Demo123456</code>
            </div>

            <!-- Sign Up Link -->
            <div class="login-footer">
                <p>Don't have an account? <a href="register.html">Create one now</a></p>
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; 2025 GENTLEMEN PARLOR. All rights reserved.</p>
    </footer>

    <script src="js/utilities.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/apiService.js"></script>
    <script src="js/navUser.js"></script>
    <script>
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const rememberMeCheckbox = document.getElementById('rememberMe');
        const loginForm = document.getElementById('loginForm');
        const messageBox = document.getElementById('messageBox');
        const submitBtn = document.getElementById('submitBtn');
        const togglePasswordBtn = document.getElementById('togglePassword');

        // Toggle password visibility
        togglePasswordBtn.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);

            // Change icon appearance
            if (type === 'text') {
                togglePasswordBtn.style.opacity = '0.6';
            } else {
                togglePasswordBtn.style.opacity = '1';
            }
        });

        // Validate email format
        function isValidEmail(email) {
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return emailRegex.test(email);
        }

        // Show message
        function showMessage(text, type) {
            messageBox.textContent = text;
            messageBox.className = `message show ${type}`;

            if (type !== 'error') {
                setTimeout(() => {
                    messageBox.classList.remove('show');
                }, 5000);
            }

            if (toast && typeof toast[type] === 'function') {
                toast[type](text);
            }
        }

        // Load remembered email
        window.addEventListener('load', () => {
            const rememberedEmail = localStorage.getItem('rememberedEmail');
            const rememberPreference = localStorage.getItem('rememberMe') === 'true';

            if (rememberedEmail && rememberPreference) {
                emailInput.value = rememberedEmail;
                rememberMeCheckbox.checked = true;
            }

            if (window.location.protocol === 'file:') {
                const redirectUrl = 'http://localhost:5000/login.html';
                fetch(redirectUrl, {
                    method: 'GET',
                    mode: 'cors',
                    cache: 'no-cache'
                })
                    .then((res) => {
                        if (res.ok) {
                            window.location.replace(redirectUrl);
                        } else {
                            showMessage(
                                'This page is opened from a file:// URL. Start the backend server and open this page from http://localhost:5000/login.html or via a local web server so the login page can reach the API.',
                                'error'
                            );
                        }
                    })
                    .catch(() => {
                        showMessage(
                            'This page is opened from a file:// URL. Start the backend server and open this page from http://localhost:5000/login.html or via a local web server so the login page can reach the API.',
                            'error'
                        );
                    });
            }
        });

        // Form submission
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Validation
            const email = emailInput.value.trim();
            const password = passwordInput.value;

            if (!email || !isValidEmail(email)) {
                showMessage('Please enter a valid email address', 'error');
                emailInput.focus();
                return;
            }

            if (!password || password.length === 0) {
                showMessage('Please enter your password', 'error');
                passwordInput.focus();
                return;
            }

            try {
                submitBtn.disabled = true;
                showMessage('Signing in...', 'info');

                const response = await apiService.login(email, password);

                if (response.success) {
                    // Handle "Remember Me"
                    if (rememberMeCheckbox.checked) {
                        localStorage.setItem('rememberedEmail', email);
                        localStorage.setItem('rememberMe', 'true');
                    } else {
                        localStorage.removeItem('rememberedEmail');
                        localStorage.setItem('rememberMe', 'false');
                    }

                    storageManager.set('user', response.user);

                    showMessage('Login successful! Redirecting...', 'success');
                    setTimeout(() => {
                        window.location.href = 'user.html';
                    }, 1500);
                } else {
                    showMessage(response.message || 'Invalid email or password', 'error');
                    submitBtn.disabled = false;
                    passwordInput.value = '';
                }
            } catch (error) {
                const errorMsg = errorHandler ? errorHandler.getErrorMessage(error) : (error.message || 'An error occurred. Please try again.');
                console.error('Login error:', error);
                showMessage(errorMsg, 'error');
                submitBtn.disabled = false;
            }
        });

        // Check if a valid session already exists and avoid a repeated profile request.
        window.addEventListener('load', () => {
            const hasUser = !!storageManager.get('user');
            const hasToken = apiService.hasStoredToken?.();

            if (hasUser && hasToken) {
                window.location.href = 'user.html';
            }
        });

        // Add some polish: Focus styles
        emailInput.addEventListener('focus', () => {
            emailInput.parentElement.style.borderColor = '#8B7355';
        });

        passwordInput.addEventListener('focus', () => {
            passwordInput.parentElement.style.borderColor = '#8B7355';
        });
    </script>
    <script src="js/smoothNavigation.js"></script>
</body>
</html>
